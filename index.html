<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUM ALPHA | Hub Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #0a0e17; }
        body { background: var(--bg); color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shop-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 glass h-20 flex items-center px-8 justify-between">
        <div class="flex items-center gap-3">
            <img id="site_logo" src="" class="h-10">
            <span class="text-xl font-bold italic">NEXUM <span style="color:var(--neon)">ALPHA</span></span>
        </div>
        <div class="flex gap-6 items-center">
            <a href="#boutique" class="hover:text-cyan-400">Boutique</a>
            <button onclick="document.getElementById('badge-modal').classList.remove('hidden')" class="bg-cyan-500 text-black px-4 py-2 rounded-full font-bold text-xs">MON BADGE</button>
        </div>
    </nav>

    <section class="h-[60vh] flex flex-col items-center justify-center text-center">
        <h1 class="text-6xl font-black mb-4">L'EXPERTISE <span style="color:var(--neon)">DIGITALE</span></h1>
        <p class="text-slate-400">Formations d'élite et produits numériques de haute performance.</p>
    </section>

    <section id="boutique" class="py-20 px-8 max-w-7xl mx-auto">
        <h2 class="text-3xl font-bold mb-12 italic border-l-4 border-cyan-500 pl-4">BOUTIQUE DIGITALE</h2>
        <div class="grid md:grid-cols-3 gap-8" id="shop-container">
            </div>
    </section>

    <div id="badge-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-lg">
            <h2 class="text-2xl font-bold mb-6 text-cyan-400">Générer mon Badge Membre</h2>
            <div class="space-y-4 text-black">
                <input type="text" id="b_nom" placeholder="Nom Complet" class="w-full p-3 rounded-xl bg-white/10 text-white outline-none border border-white/20">
                <input type="text" id="b_poste" placeholder="Poste / Fonction" class="w-full p-3 rounded-xl bg-white/10 text-white outline-none border border-white/20">
                <div class="text-white text-sm mb-2">Photo d'identité (URL ou Base64) :</div>
                <input type="file" id="b_photo" class="text-white text-xs">
                <button onclick="genererBadgePDF()" class="w-full bg-cyan-500 py-4 rounded-2xl font-bold text-black hover:bg-cyan-400 transition">TÉLÉCHARGER LE BADGE</button>
            </div>
            <button onclick="document.getElementById('badge-modal').classList.add('hidden')" class="mt-4 text-slate-500 text-sm">Fermer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJmFMpJsMsQCrYM4Xw5yVScNfDzW6tncI",
            authDomain: "nexumalpha-27597.firebaseapp.com",
            projectId: "nexumalpha-27597",
            storageBucket: "nexumalpha-27597.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CHARGER BOUTIQUE
        onSnapshot(collection(db, "boutique"), (snap) => {
            const container = document.getElementById('shop-container');
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                container.innerHTML += `
                    <div class="glass p-6 rounded-3xl shop-card transition">
                        <img src="${p.image}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <h3 class="text-xl font-bold mb-2">${p.nom}</h3>
                        <p class="text-slate-400 text-sm mb-4">${p.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-cyan-400 font-bold">${p.prix} FCFA</span>
                            <button class="bg-white text-black px-4 py-2 rounded-lg text-xs font-bold">ACHETER</button>
                        </div>
                    </div>`;
            });
        });

        // LOGIQUE BADGE
        window.genererBadgePDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: [54, 86] }); // Format carte de crédit
            
            const nom = document.getElementById('b_nom').value;
            const poste = document.getElementById('b_poste').value;

            doc.setFillColor(10, 14, 23);
            doc.rect(0, 0, 54, 86, 'F');
            doc.setTextColor(0, 242, 255);
            doc.setFontSize(12);
            doc.text("NEXUM ALPHA", 27, 15, null, null, "center");
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text(nom.toUpperCase(), 27, 55, null, null, "center");
            doc.setFontSize(8);
            doc.text(poste, 27, 62, null, null, "center");
            doc.save(`Badge_${nom}.pdf`);
        };
    </script>
</body>
</html>
