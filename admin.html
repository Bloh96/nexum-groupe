<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction NEXUM ALPHA | Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { projectId: "nexumalpha-27597" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SAUVEGARDE DES INFOS ENTREPRISE ---
        window.saveConfig = async () => {
            const config = {
                nom: "NEXUM ALPHA",
                ifu: document.getElementById('conf_ifu').value,
                rccm: document.getElementById('conf_rccm').value,
                email: document.getElementById('conf_email').value,
                tel: document.getElementById('conf_tel').value,
                logoUrl: document.getElementById('conf_logo').value, // Lien vers une image
                secteur: document.getElementById('conf_secteur').value
            };
            await setDoc(doc(db, "parametres", "entreprise"), config);
            alert("Informations mises à jour sur tout le site !");
        };

        // --- CHARGEMENT INITIAL ---
        async function loadData() {
            const snap = await getDoc(doc(db, "parametres", "entreprise"));
            if(snap.exists()){
                const d = snap.data();
                document.getElementById('conf_ifu').value = d.ifu || "";
                document.getElementById('conf_rccm').value = d.rccm || "";
                document.getElementById('conf_email').value = d.email || "";
                document.getElementById('conf_tel').value = d.tel || "";
                document.getElementById('conf_logo').value = d.logoUrl || "";
                document.getElementById('conf_secteur').value = d.secteur || "";
            }
        }
        loadData();

        // --- GESTION DES MEMBRES ---
        onSnapshot(collection(db, "utilisateurs"), (snap) => {
            const list = document.getElementById('membres_list');
            list.innerHTML = "";
            snap.forEach(userDoc => {
                const u = userDoc.data();
                list.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-gray-50 mb-2 rounded">
                    <span>${u.nom} (${u.email})</span>
                    <button onclick="validerMembre('${userDoc.id}', ${!u.valide})" 
                        class="px-3 py-1 rounded ${u.valide ? 'bg-red-500' : 'bg-green-500'} text-white text-xs">
                        ${u.valide ? 'Bloquer' : 'Approuver'}
                    </button>
                </div>`;
            });
        });

        window.validerMembre = async (id, status) => {
            await updateDoc(doc(db, "utilisateurs", id), { valide: status });
        };
    </script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-900 mb-8">Console de Direction NEXUM ALPHA</h1>
        
        <div class="grid md:grid-cols-2 gap-8">
            <!-- CONFIGURATION SITE -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-blue-700">Configuration du Site</h2>
                <div class="space-y-3">
                    <input type="text" id="conf_logo" placeholder="Lien du Logo (URL)" class="w-full p-2 border rounded">
                    <input type="text" id="conf_ifu" placeholder="Numéro IFU" class="w-full p-2 border rounded">
                    <input type="text" id="conf_rccm" placeholder="Numéro RCCM" class="w-full p-2 border rounded">
                    <input type="email" id="conf_email" placeholder="Email de contact" class="w-full p-2 border rounded">
                    <input type="text" id="conf_tel" placeholder="Téléphone" class="w-full p-2 border rounded">
                    <textarea id="conf_secteur" placeholder="Secteur d'activité" class="w-full p-2 border rounded"></textarea>
                    <button onclick="saveConfig()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Mettre à jour le site</button>
                </div>
            </div>

            <!-- GESTION DES MEMBRES -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-green-700">Validation des Membres (CeFOR BENIN)</h2>
                <div id="membres_list" class="max-h-64 overflow-y-auto">
                    <!-- Liste générée par JS -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
