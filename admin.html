<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Master | NEXUM ALPHA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <h1 class="text-3xl font-black text-cyan-400 mb-12 uppercase tracking-tighter">Command Center NEXUM</h1>

    <div class="grid lg:grid-cols-2 gap-12">
        <div class="bg-slate-800 p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 italic">Gestion des Adhésions</h2>
            <div id="adh-list" class="space-y-4"></div>
        </div>

        <div class="bg-slate-800 p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-6 italic">Ajouter au Shop</h2>
            <div class="space-y-4">
                <input type="text" id="p_nom" placeholder="Nom du produit / formation" class="w-full p-3 bg-slate-700 rounded-xl">
                <input type="text" id="p_image" placeholder="URL Image" class="w-full p-3 bg-slate-700 rounded-xl">
                <input type="number" id="p_prix" placeholder="Prix (FCFA)" class="w-full p-3 bg-slate-700 rounded-xl">
                <textarea id="p_desc" placeholder="Description courte" class="w-full p-3 bg-slate-700 rounded-xl"></textarea>
                <button onclick="ajouterProduit()" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-bold uppercase">Mettre en vente</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJmFMpJsMsQCrYM4Xw5yVScNfDzW6tncI",
            authDomain: "nexumalpha-27597.firebaseapp.com",
            projectId: "nexumalpha-27597",
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // SYNC MEMBRES
        onSnapshot(collection(db, "utilisateurs"), (snap) => {
            const list = document.getElementById('adh-list');
            list.innerHTML = "";
            snap.forEach(userDoc => {
                const u = userDoc.data();
                if(!u.traite) {
                    list.innerHTML += `
                    <div class="p-4 bg-slate-700 rounded-2xl flex justify-between items-center">
                        <div>
                            <div class="font-bold">${u.nom}</div>
                            <div class="text-xs text-slate-400">${u.email}</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="repondreAdhesion('${userDoc.id}', '${u.email}', true)" class="bg-emerald-500 p-2 rounded-lg text-xs font-bold">ACCEPTER</button>
                            <button onclick="repondreAdhesion('${userDoc.id}', '${u.email}', false)" class="bg-red-500 p-2 rounded-lg text-xs font-bold">REFUSER</button>
                        </div>
                    </div>`;
                }
            });
        });

        window.repondreAdhesion = async (id, email, status) => {
            // 1. Marquer comme traité dans Firestore
            await updateDoc(doc(db, "utilisateurs", id), { traite: true, valide: status });
            
            // 2. Déclencher l'Email (via Firebase Extension "Trigger Email")
            // Note: Pour que cela fonctionne, installe l'extension "Trigger Email" dans ta console Firebase
            await addDoc(collection(db, "mail"), {
                to: email,
                message: {
                    subject: status ? "Bienvenue chez NEXUM ALPHA !" : "Information concernant votre demande",
                    text: status ? "Félicitations, votre demande d'adhésion a été validée. Vous pouvez maintenant générer votre badge sur le site." : "Désolé, votre demande n'a pas été retenue pour le moment.",
                }
            });
            alert("Réponse envoyée !");
        };

        window.ajouterProduit = async () => {
            await addDoc(collection(db, "boutique"), {
                nom: document.getElementById('p_nom').value,
                prix: document.getElementById('p_prix').value,
                image: document.getElementById('p_image').value,
                description: document.getElementById('p_desc').value
            });
            alert("Produit ajouté à la boutique !");
        };
    </script>
</body>
</html>
